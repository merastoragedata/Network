<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MSETCL Grid Viewer — 765/400 kV Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root{
  --bg:#080c11; --panel:#0f151c; --panel2:#0b1016; --line:#1d2833;
  --edge:#1d2833; --text:#dce8f2; --muted:#7a8c9b;
  --v765:#e14fd6; --v400:#ff5555; --v220:#f5c542;
  --ok:#3ddc84; --warn:#ffb020; --bad:#ff3b3b; --accent:#4cc4ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;margin:0;}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100dvh;}

/* ---------- boot ---------- */
.boot{height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:14px;padding:24px;text-align:center;}
.boot-err{color:var(--bad);font-weight:700;font-size:16px;}
.boot-msg{max-width:460px;line-height:1.6;font-size:13px;}
.spinner{width:26px;height:26px;border:2.5px solid var(--edge);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---------- top bar ---------- */
.top{display:flex;align-items:center;gap:14px;padding:9px 14px;background:linear-gradient(180deg,#131c25,#0b1117);border-bottom:1px solid var(--edge);flex-shrink:0;flex-wrap:wrap;}
.brandbox .b1{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;letter-spacing:.06em;line-height:1;}
.brandbox .b2{font-size:9.5px;color:var(--muted);letter-spacing:.12em;margin-top:2px;}
.modes{display:flex;gap:4px;background:var(--panel2);padding:3px;border-radius:8px;border:1px solid var(--edge);}
.mbtn{padding:6px 14px;border:0;background:transparent;color:var(--muted);font-size:12.5px;font-weight:600;border-radius:6px;cursor:pointer;font-family:inherit;}
.mbtn.on{background:var(--accent);color:#00202e;}
.hamburger{display:none;margin-left:auto;background:var(--panel2);border:1px solid var(--edge);color:var(--text);font-size:17px;border-radius:8px;padding:5px 12px;cursor:pointer;}
.controls{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap;}
.find{background:var(--panel2);border:1px solid var(--edge);border-radius:7px;padding:7px 11px;color:var(--text);font-size:12.5px;font-family:'IBM Plex Mono',monospace;width:190px;}
.find:focus{outline:none;border-color:var(--accent);}
.tgl{display:inline-flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--edge);border-radius:20px;padding:5px 12px 5px 6px;cursor:pointer;color:var(--muted);font-size:11.5px;font-weight:600;font-family:inherit;}
.tgl .knob{width:11px;height:11px;border-radius:50%;background:#39485a;transition:.18s;}
.tgl.on{color:var(--text);border-color:rgba(76,196,255,.45);}
.tgl.on .knob{background:var(--accent);box-shadow:0 0 8px rgba(76,196,255,.8);}
.saving{font-size:11px;color:var(--accent);font-family:'IBM Plex Mono',monospace;}

/* ---------- sim bar ---------- */
.simbar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(255,59,59,.07);border-bottom:1px solid rgba(255,59,59,.25);overflow-x:auto;flex-shrink:0;}
.simbar .hint{font-size:12px;color:var(--muted);}
.simbar .cnt{font-size:11.5px;font-weight:700;color:var(--bad);white-space:nowrap;}
.chip{font-size:11px;padding:4px 10px;border-radius:20px;white-space:nowrap;border:1px solid;}
.chip.ok{color:var(--ok);border-color:rgba(61,220,132,.35);background:rgba(61,220,132,.08);}
.chip.bad{color:var(--bad);border-color:rgba(255,59,59,.35);background:rgba(255,59,59,.08);}

/* ---------- stage / svg ---------- */
.stage{flex:1;position:relative;min-height:0;}
.scroller{position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch;background:radial-gradient(ellipse at 30% 15%,#101922 0%,#080c11 65%);}
.net{width:100%;height:100%;min-width:900px;display:block;}
.blabel{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;pointer-events:none;}
.ckt{font-family:'IBM Plex Mono',monospace;font-size:7.5px;font-style:italic;letter-spacing:.02em;}
.zonelabel{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.28em;fill:rgba(255,255,255,.13);}

/* animated normal-flow dashes */
.flowdash{animation:flow 1.4s linear infinite;}
@keyframes flow{from{stroke-dashoffset:31;}to{stroke-dashoffset:0;}}
@media (prefers-reduced-motion:reduce){.flowdash{animation:none;}}

/* ---------- tooltip ---------- */
.tip{position:absolute;z-index:40;background:#101a23;border:1px solid var(--edge);border-radius:8px;padding:8px 11px;font-size:11.5px;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.6);display:flex;flex-direction:column;gap:2px;max-width:260px;}
.tip b{font-size:12.5px;}
.tip span{color:var(--muted);font-size:10.5px;}

/* ---------- status ---------- */
.status{display:flex;gap:16px;padding:6px 14px;background:#070a0e;border-top:1px solid var(--edge);font-size:10.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;flex-shrink:0;overflow-x:auto;}
.status .w{color:var(--warn);}
.status .e{color:var(--bad);}
.status .dim{margin-left:auto;white-space:nowrap;}

/* ---------- detail (replaces map) ---------- */
.detail{position:absolute;inset:0;z-index:60;background:var(--bg);display:flex;flex-direction:column;}
.dhead{padding:10px 14px;border-bottom:1px solid var(--edge);background:var(--panel);flex-shrink:0;}
.back{background:none;border:0;color:var(--accent);font-size:13.5px;font-weight:600;cursor:pointer;padding:6px 0;font-family:inherit;}
.dbody{flex:1;overflow-y:auto;padding:22px 20px 60px;max-width:1000px;width:100%;margin:0 auto;}
.dbody h1{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;margin:0 0 10px;letter-spacing:.01em;line-height:1.15;}
.dbody h3{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:26px 0 10px;font-weight:600;}
.dbody h3 em{font-style:normal;color:#4d5f6e;}
.meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px;}
.note{color:var(--muted);font-size:12.5px;line-height:1.6;background:var(--panel2);border-left:2px solid var(--warn);padding:9px 12px;border-radius:0 6px 6px 0;}
.tag{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--edge);color:var(--muted);letter-spacing:.02em;}
.tag.sm{font-size:9.5px;padding:3px 8px;}
.tag.v765{color:var(--v765);border-color:rgba(225,79,214,.4);background:rgba(225,79,214,.1);}
.tag.v400{color:var(--v400);border-color:rgba(255,85,85,.4);background:rgba(255,85,85,.1);}
.tag.ok{color:var(--ok);border-color:rgba(61,220,132,.4);background:rgba(61,220,132,.1);}
.tag.bad{color:var(--bad);border-color:rgba(255,59,59,.4);background:rgba(255,59,59,.1);}
.tag.warn{color:var(--warn);border-color:rgba(255,176,32,.4);background:rgba(255,176,32,.1);}
.tag.exp{color:var(--warn);}
.tag.imp{color:var(--accent);}
.tag.dc{color:#4cc4ff;border-color:rgba(76,196,255,.4);background:rgba(76,196,255,.1);}
.tag.src{color:#ff8a3d;border-color:rgba(255,138,61,.4);background:rgba(255,138,61,.1);text-transform:capitalize;}
.tag.v500{color:#4cc4ff;border-color:rgba(76,196,255,.4);background:rgba(76,196,255,.1);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:9px;}
.card{background:var(--panel2);border:1px solid var(--edge);border-radius:9px;padding:12px;text-align:left;cursor:pointer;font-family:inherit;color:var(--text);transition:border-color .15s,transform .1s;}
.card:hover{border-color:var(--accent);}
.card:active{transform:scale(.985);}
.card.static{cursor:default;}
.card.static:hover{border-color:var(--edge);}
.ctitle{font-size:13px;font-weight:600;margin-bottom:7px;line-height:1.3;}
.crow{display:flex;gap:5px;flex-wrap:wrap;}
.empty{color:var(--muted);font-size:12.5px;padding:12px;grid-column:1/-1;}
.flowline{font-family:'IBM Plex Mono',monospace;font-size:13px;background:var(--panel2);border:1px solid var(--edge);border-radius:9px;padding:14px;color:var(--ok);line-height:1.6;}
.editor{margin-top:30px;border-top:1px solid var(--edge);padding-top:18px;}
.editor label{display:block;font-size:11px;color:var(--muted);margin-bottom:11px;}
.editor input,.editor select{display:block;width:100%;margin-top:5px;background:var(--panel2);border:1px solid var(--edge);color:var(--text);padding:9px 10px;border-radius:7px;font-size:13px;font-family:'IBM Plex Mono',monospace;}
.editor input:focus,.editor select:focus{outline:none;border-color:var(--accent);}
.btn{background:var(--panel2);border:1px solid var(--edge);color:var(--text);padding:9px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn.primary{background:var(--accent);color:#00202e;border-color:var(--accent);}
.btn.tiny{padding:4px 11px;font-size:11px;white-space:nowrap;}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-track{background:var(--panel2);}
::-webkit-scrollbar-thumb{background:#243342;border-radius:5px;}

/* ---------- page tabs ---------- */
.pages{display:flex;gap:3px;background:var(--panel2);padding:3px;border-radius:8px;border:1px solid var(--edge);}
.pbtn{padding:6px 13px;border:0;background:transparent;color:var(--muted);font-size:12.5px;font-weight:600;border-radius:6px;cursor:pointer;font-family:inherit;}
.pbtn.on{background:#22303d;color:var(--text);}

/* ---------- zoom controls ---------- */
.zoomctl{position:absolute;right:14px;bottom:14px;z-index:25;display:flex;flex-direction:column;gap:5px;background:rgba(11,16,22,.92);border:1px solid var(--edge);border-radius:10px;padding:6px;backdrop-filter:blur(6px);}
.zoomctl button{width:34px;height:34px;border:1px solid var(--edge);background:var(--panel2);color:var(--text);border-radius:7px;font-size:17px;cursor:pointer;line-height:1;}
.zoomctl button:hover{border-color:var(--accent);color:var(--accent);}
.zoomctl .rst{font-size:14px;}
.zlvl{font-size:9.5px;color:var(--muted);text-align:center;font-family:'IBM Plex Mono',monospace;}

/* ---------- map page ---------- */
.mappage{position:absolute;inset:0;display:flex;flex-direction:column;}
.maptools{display:flex;gap:7px;align-items:center;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--edge);flex-wrap:wrap;flex-shrink:0;}
.maptools .find{width:250px;}
.maptools .sel{width:210px;font-size:12px;}
.maptools .hint{font-size:11px;color:var(--muted);}
.mapcanvas{flex:1;min-height:0;background:#0b1016;}
.leaflet-container{background:#0b1016;font-family:Inter,sans-serif;}
.maploading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;pointer-events:none;}
.mapinfo{position:absolute;left:14px;bottom:20px;z-index:1000;background:rgba(11,16,22,.95);border:1px solid var(--edge);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;max-width:280px;}
.mapinfo .x{position:absolute;top:5px;right:8px;background:none;border:0;color:var(--muted);font-size:17px;cursor:pointer;}
.btn.primary.tiny{background:var(--accent);color:#00202e;}

/* ---------- OSM locate panel ---------- */
.mapside{position:absolute;top:0;right:0;bottom:0;z-index:1000;display:flex;width:38px;transition:width .22s ease;}
.mapside.open{width:365px;}
.sidetabs{display:flex;flex-direction:column;gap:3px;background:#0b1016;border-left:1px solid var(--edge);padding:8px 4px;flex-shrink:0;}
.stab{writing-mode:vertical-rl;padding:11px 5px;border:0;background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;border-radius:5px;font-family:inherit;letter-spacing:.05em;}
.stab.on{background:#1d2833;color:var(--accent);}
.stab.close{writing-mode:horizontal-tb;font-size:15px;margin-top:auto;}
.sidebody{flex:1;overflow-y:auto;background:rgba(11,16,22,.97);border-left:1px solid var(--edge);backdrop-filter:blur(8px);}
.mapside:not(.open) .sidebody{display:none;}
.locate{position:relative;top:auto;right:auto;bottom:auto;width:auto;max-height:none;background:none;border:0;border-bottom:1px solid var(--edge);border-radius:0;padding:12px;}
.lochead{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px;margin-bottom:9px;}
.locrow{display:flex;gap:6px;flex-wrap:wrap;}
.locrow .find{flex:1;min-width:150px;font-size:12px;width:auto;}
.locstate{font-size:11px;color:var(--muted);margin-top:8px;}
.candlist{display:flex;flex-direction:column;gap:5px;margin-top:9px;}
.cand{display:flex;flex-direction:column;gap:2px;text-align:left;background:var(--panel2);border:1px solid var(--edge);border-radius:8px;padding:8px 10px;cursor:pointer;font-family:inherit;color:var(--text);}
.cand:hover{border-color:var(--accent);}
.cand .ck{font-size:8.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--accent);font-weight:700;}
.cand .cl{font-size:12px;font-weight:600;line-height:1.3;}
.cand .cd{font-size:10.5px;color:var(--muted);}
.cand .cc{font-size:9.5px;color:#5b6d7c;font-family:'IBM Plex Mono',monospace;}

/* stack the two locator panels */

.warnrow{color:var(--warn);}
.chosenbox{margin-top:9px;padding:9px 10px;background:rgba(61,220,132,.08);border:1px solid rgba(61,220,132,.32);border-radius:8px;display:flex;flex-direction:column;gap:5px;}
.chosenbox b{font-size:12px;}
.chosenbox .cd{font-size:10.5px;color:var(--muted);}

.altname{width:100%!important;margin-top:6px;font-size:12px;}

.fieldrow{display:flex;gap:8px;margin-top:8px;}
.fieldrow label{flex:1;font-size:10.5px;color:var(--muted);display:flex;flex-direction:column;gap:4px;}
.fieldrow select{background:var(--panel2);border:1px solid var(--edge);color:var(--text);padding:6px 8px;border-radius:6px;font-size:12px;font-family:'IBM Plex Mono',monospace;}
.weightrow{display:flex;flex-direction:column;gap:5px;font-size:10.5px;color:var(--muted);margin-top:9px;}
.weightrow b{color:var(--text);font-family:'IBM Plex Mono',monospace;}
.weightrow input[type=range]{width:100%;accent-color:var(--accent);}
.editor input[type=range]{width:100%;accent-color:var(--accent);margin-top:6px;}

/* ---------- draw.io panel ---------- */
.diobox{margin-top:8px;}
.diorow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.diostate{font-size:12px;color:var(--accent);margin:8px 0;}
.diopreview{background:var(--panel2);border:1px solid rgba(61,220,132,.3);border-radius:9px;padding:12px;margin:10px 0;}
.diolist{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.diorowitem{display:flex;justify-content:space-between;gap:10px;font-size:11.5px;padding:5px 8px;background:var(--panel2);border-radius:6px;}
.diorowitem code{color:var(--muted);font-size:10.5px;}
.diorowitem.dim{color:var(--muted);justify-content:center;}
.diover{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--edge);border-radius:8px;padding:9px 11px;}
.dvlabel{font-size:12px;font-weight:600;word-break:break-all;}
.dvmeta{display:flex;gap:7px;align-items:center;font-size:10px;color:var(--muted);margin-top:3px;flex-wrap:wrap;}

/* ---------- settings page ---------- */
.settingspage{position:absolute;inset:0;overflow-y:auto;}
.setgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:9px;}
.setrow{display:flex;align-items:center;gap:11px;background:var(--panel2);border:1px solid var(--edge);border-radius:9px;padding:11px 13px;font-size:12.5px;}
.setrow span{flex:1;}
.setrow code{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.setrow input[type=color],.colorrow input[type=color]{width:38px;height:28px;border:1px solid var(--edge);border-radius:6px;background:none;cursor:pointer;padding:2px;}
.colorrow{display:flex;align-items:center;gap:9px;margin-top:5px;}

/* ---------- mobile ---------- */
@media (max-width:820px){
  .top{gap:10px;padding:9px 12px;}
  .brandbox .b1{font-size:16px;}
  .brandbox .b2{display:none;}
  .hamburger{display:block;}
  .controls{display:none;order:9;width:100%;margin-left:0;padding-top:9px;border-top:1px solid var(--edge);}
  .controls.open{display:flex;}
  .find{width:100%;}
  .tgl{flex:1;justify-content:center;}
  .modes{flex:1;}
  .mbtn{flex:1;padding:8px 6px;}
  .pages{flex:1;}
  .pbtn{flex:1;padding:8px 6px;}
  .maptools .find,.maptools .sel{width:100%;}
  .mapside{position:absolute;left:0;right:0;bottom:0;top:auto;width:auto;height:40px;flex-direction:column-reverse;}
  .mapside.open{width:auto;height:56%;}
  .sidetabs{flex-direction:row;border-left:0;border-top:1px solid var(--edge);padding:4px 8px;}
  .stab{writing-mode:horizontal-tb;flex:1;padding:8px 4px;}
  .stab.close{margin-top:0;margin-left:auto;}
  .sidebody{border-left:0;}
  .zoomctl{right:10px;bottom:10px;}
  .zoomctl button{width:40px;height:40px;}
  .setgrid{grid-template-columns:1fr;}
  .dbody{padding:18px 15px 50px;}
  .dbody h1{font-size:23px;}
  .grid{grid-template-columns:1fr;}
  .tip{display:none;}
  .status{gap:11px;font-size:9.5px;}
  .status .dim{display:none;}
}
@media (max-width:420px){
  .brandbox .b1{font-size:14px;letter-spacing:.03em;}
  .net{min-width:760px;}
}
</style>
</head>
<body>
<div id="root">
  <div class="boot"><div class="spinner"></div><div>Starting…</div></div>
</div>
<script>
window.addEventListener('error',function(e){
  var r=document.getElementById('root');
  if(r) r.innerHTML='<div style="padding:26px;color:#ff6b6b;font-family:monospace;white-space:pre-wrap;font-size:13px;">Script error: '+(e.message||'?')+'\n'+(e.filename||'')+':'+(e.lineno||'')+'</div>';
});
</script>
<script>
const {
  useState,
  useEffect,
  useMemo,
  useRef,
  useCallback
} = React;
const GAS_URL = "https://script.google.com/macros/s/AKfycbwGiF0fO1RlMhKaJR8u0r0JXoOhfZEk5F0s5_C4Lch5pZcQKhNUiQ6YBezABya5eb0/exec";
const OWNER_LABEL = {
  PG: 'POWERGRID',
  MSETCL: 'MSETCL',
  IPP: 'IPP / Captive',
  INTERSTATE: 'Interstate tie'
};
async function apiPost(action, payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain;charset=utf-8'
    },
    body: JSON.stringify({
      action,
      payload
    })
  });
  return res.json();
}

// Off-page connectors: a station drawn twice is still ONE electrical node.
function canonicalMap(subs) {
  const m = {};
  subs.forEach(s => {
    m[s.id] = s.sameAs && String(s.sameAs).trim() ? String(s.sameAs).trim() : s.id;
  });
  return m;
}
function buildAdjacency(subs, lines) {
  const canon = canonicalMap(subs);
  const adj = {};
  subs.forEach(s => {
    const c = canon[s.id];
    if (!adj[c]) adj[c] = [];
  });
  lines.forEach(l => {
    if (l.status === 'tripped') return;
    const f = canon[l.from],
      t = canon[l.to];
    if (!f || !t || f === t) return;
    adj[f].push({
      to: t
    });
    adj[t].push({
      to: f
    });
  });
  return adj;
}
function findIsolated(subs, lines) {
  const canon = canonicalMap(subs);
  const adj = buildAdjacency(subs, lines);
  const seen = new Set();
  const comps = [];
  Object.keys(adj).forEach(nid => {
    if (seen.has(nid)) return;
    const comp = [],
      q = [nid];
    seen.add(nid);
    while (q.length) {
      const cur = q.shift();
      comp.push(cur);
      (adj[cur] || []).forEach(n => {
        if (!seen.has(n.to)) {
          seen.add(n.to);
          q.push(n.to);
        }
      });
    }
    comps.push(comp);
  });
  comps.sort((a, b) => b.length - a.length);
  return comps.slice(1).flat();
}
function findPath(subs, lines, a, b) {
  const canon = canonicalMap(subs);
  a = canon[a] || a;
  b = canon[b] || b;
