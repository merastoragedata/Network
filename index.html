<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MSETC Grid Viewer — 765/400 kV Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#0b0f14;
    --panel:#111820;
    --panel-2:#0e141b;
    --line:#1e2a35;
    --text:#dbe7ef;
    --muted:#6f8494;
    --v765:#e14fd6;
    --v400:#ff4d4d;
    --v220:#f5c542;
    --ok:#3ddc84;
    --warn:#ffb020;
    --danger:#ff3b3b;
    --accent:#38bdf8;
  }
  *{box-sizing:border-box;}
  html,body,#root{height:100%;margin:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    overflow:hidden;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  .app{display:flex;flex-direction:column;height:100vh;}

  .topbar{
    display:flex;align-items:center;gap:18px;
    padding:10px 16px;
    background:linear-gradient(180deg,#121a22,#0d1319);
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .brand{display:flex;flex-direction:column;line-height:1.1;}
  .brand .t1{font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--text);}
  .brand .t2{font-size:10.5px;color:var(--muted);letter-spacing:.08em;}
  .modes{display:flex;gap:6px;margin-left:8px;}
  .mode-btn{
    padding:6px 14px;border-radius:6px;border:1px solid var(--line);
    background:transparent;color:var(--muted);font-size:12.5px;font-weight:600;
    cursor:pointer;letter-spacing:.03em;transition:all .15s;
  }
  .mode-btn.active{background:var(--accent);color:#00212e;border-color:var(--accent);}
  .mode-btn:not(.active):hover{border-color:var(--muted);color:var(--text);}
  .search{
    margin-left:auto;background:var(--panel-2);border:1px solid var(--line);
    border-radius:6px;padding:6px 10px;color:var(--text);font-size:12.5px;
    width:220px;font-family:'IBM Plex Mono',monospace;
  }
  .search:focus{outline:none;border-color:var(--accent);}
  .legend{display:flex;gap:14px;align-items:center;font-size:11px;color:var(--muted);}
  .legend-item{display:flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .body{flex:1;display:flex;min-height:0;}
  .canvas-wrap{flex:1;position:relative;overflow:auto;background:
    radial-gradient(circle at 20% 10%, #10181f 0%, #0b0f14 60%);
  }
  svg{display:block;}

  .sub-node{cursor:pointer;}
  .sub-circle{fill:var(--panel);stroke-width:2;transition:filter .15s;}
  .sub-circle:hover{filter:brightness(1.4);}
  .sub-label{fill:var(--text);font-size:10px;font-family:'IBM Plex Mono',monospace;pointer-events:none;}
  .sub-region{fill:var(--muted);font-size:7.5px;pointer-events:none;}

  .line-path{fill:none;cursor:pointer;}
  .line-path.v400{stroke:var(--v400);}
  .line-path.v220{stroke:var(--v220);}
  .line-path.v765{stroke:var(--v765);}
  .line-path.tripped{stroke:#3a4552;stroke-dasharray:4 4;}
  .line-hit{fill:none;stroke:transparent;stroke-width:14px;cursor:pointer;}

  .flow-chevron{fill:none;stroke-linecap:round;}

  .ict-badge{fill:#1a2530;stroke:var(--v765);stroke-width:1.5;}
  .ict-label{fill:var(--v765);font-size:8px;font-family:'IBM Plex Mono',monospace;pointer-events:none;}

  .tooltip{
    position:absolute;background:#0f1720;border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text);
    pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:50;
    max-width:260px;
  }
  .tooltip .tt-title{font-weight:700;margin-bottom:4px;font-size:12.5px;}
  .tooltip .tt-row{color:var(--muted);font-size:11px;}

  .sidepanel{
    width:340px;flex-shrink:0;background:var(--panel);
    border-left:1px solid var(--line);padding:18px;overflow-y:auto;
  }
  .sidepanel h2{font-size:15px;margin:0 0 2px 0;letter-spacing:.02em;}
  .sidepanel .sub{color:var(--muted);font-size:11.5px;margin-bottom:16px;}
  .panel-empty{color:var(--muted);font-size:13px;line-height:1.6;margin-top:40px;text-align:center;}
  .section-title{
    font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--muted);margin:18px 0 8px 0;font-weight:600;
  }
  .conn-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 10px;background:var(--panel-2);border-radius:6px;
    margin-bottom:6px;font-size:12px;border:1px solid var(--line);
  }
  .conn-row .name{font-weight:500;}
  .conn-row .dir{color:var(--muted);font-size:10.5px;font-family:'IBM Plex Mono',monospace;}
  .pill{
    display:inline-block;padding:2px 7px;border-radius:20px;font-size:9.5px;
    font-weight:700;letter-spacing:.03em;
  }
  .pill.v400{background:rgba(255,77,77,.15);color:var(--v400);}
  .pill.v220{background:rgba(245,197,66,.15);color:var(--v220);}
  .pill.v765{background:rgba(225,79,214,.15);color:var(--v765);}
  .pill.ok{background:rgba(61,220,132,.15);color:var(--ok);}
  .pill.tripped{background:rgba(255,59,59,.15);color:var(--danger);}

  .btn{
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    padding:7px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;
    width:100%;margin-top:6px;transition:all .15s;
  }
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.danger:hover{border-color:var(--danger);color:var(--danger);}
  .btn.primary{background:var(--accent);color:#00212e;border-color:var(--accent);}
  .btn.primary:hover{filter:brightness(1.1);}

  .sim-banner{
    background:rgba(255,59,59,.08);border:1px solid rgba(255,59,59,.3);
    border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;
  }
  .sim-banner .head{color:var(--danger);font-weight:700;margin-bottom:4px;}
  .sim-banner ul{margin:6px 0 0 0;padding-left:16px;color:var(--muted);}
  .sim-banner li{margin-bottom:2px;}

  .field{margin-bottom:10px;}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;}
  .field input, .field select{
    width:100%;background:var(--panel-2);border:1px solid var(--line);
    color:var(--text);padding:7px 8px;border-radius:6px;font-size:12.5px;
    font-family:'IBM Plex Mono',monospace;
  }
  .field input:focus, .field select:focus{outline:none;border-color:var(--accent);}

  .status-strip{
    display:flex;gap:18px;padding:6px 16px;background:#0a0e13;
    border-top:1px solid var(--line);font-size:10.5px;color:var(--muted);
    font-family:'IBM Plex Mono',monospace;flex-shrink:0;
  }
  .status-strip .ok{color:var(--ok);}
  .status-strip .err{color:var(--danger);}

  .loading{
    display:flex;align-items:center;justify-content:center;height:100%;
    color:var(--muted);font-size:13px;flex-direction:column;gap:10px;
  }
  .spinner{
    width:24px;height:24px;border:2.5px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:var(--panel-2);}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// =====================================================================
// CONFIG — hardcode your deployed Google Apps Script Web App URL here.
// =====================================================================
const GAS_URL = "REPLACE_WITH_DEPLOYED_GAS_URL";

// Colors per voltage level
const VCOLOR = { 400: 'var(--v400)', 220: 'var(--v220)', 765: 'var(--v765)' };

// ---------------------------------------------------------------------
// API helpers (GAS backend)
// ---------------------------------------------------------------------
async function apiGet() {
  const res = await fetch(GAS_URL, { method: 'GET' });
  return res.json();
}
async function apiPost(action, payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    // text/plain avoids a CORS preflight OPTIONS request, which
    // Apps Script web apps cannot answer.
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload })
  });
  return res.json();
}

// ---------------------------------------------------------------------
// Graph helpers for simulation (trip line -> connectivity check)
// ---------------------------------------------------------------------
function buildAdjacency(substations, lines) {
  const adj = {};
  substations.forEach(s => adj[s.id] = []);
  lines.forEach(l => {
    if (l.status === 'tripped') return;
    if (!adj[l.from] || !adj[l.to]) return;
    adj[l.from].push({ to: l.to, via: l.id });
    adj[l.to].push({ to: l.from, via: l.id });
  });
  return adj;
}

function findIsolatedNodes(substations, lines, excludeLineId) {
  const activeLines = lines.map(l => l.id === excludeLineId ? { ...l, status: 'tripped' } : l);
  const adj = buildAdjacency(substations, activeLines);
  // components via BFS
  const seen = new Set();
  const components = [];
  substations.forEach(s => {
    if (seen.has(s.id)) return;
    const comp = [];
    const q = [s.id];
    seen.add(s.id);
    while (q.length) {
      const cur = q.shift();
      comp.push(cur);
      (adj[cur] || []).forEach(n => {
        if (!seen.has(n.to)) { seen.add(n.to); q.push(n.to); }
      });
    }
    components.push(comp);
  });
  // the largest component = "main grid"; everything else is isolated
  components.sort((a, b) => b.length - a.length);
  const isolated = components.slice(1).flat();
  return isolated;
}

function findAlternatePath(substations, lines, fromId, toId, excludeLineId) {
  const activeLines = lines.map(l => l.id === excludeLineId ? { ...l, status: 'tripped' } : l);
  const adj = buildAdjacency(substations, activeLines);
  const seen = new Set([fromId]);
  const q = [[fromId]];
  while (q.length) {
    const path = q.shift();
    const cur = path[path.length - 1];
    if (cur === toId && path.length > 1) return path;
    for (const n of (adj[cur] || [])) {
      if (!seen.has(n.to)) {
        seen.add(n.to);
        q.push([...path, n.to]);
      }
    }
  }
  return null;
}

// ---------------------------------------------------------------------
// SVG geometry helpers
// ---------------------------------------------------------------------
function scalePt(p) { return { x: p.x * 0.8 + 40, y: p.y * 0.8 + 40 }; }

function pathD(a, b) {
  const A = scalePt(a), B = scalePt(b);
  return `M ${A.x} ${A.y} L ${B.x} ${B.y}`;
}

function midPoint(a, b) {
  const A = scalePt(a), B = scalePt(b);
  return { x: (A.x + B.x) / 2, y: (A.y + B.y) / 2 };
}

// Chevrons along a line indicating usual flow direction
function FlowChevrons({ a, b, reversed, color, tripped }) {
  const A = scalePt(a), B = scalePt(b);
  const dx = B.x - A.x, dy = B.y - A.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return null;
  const ux = dx / len, uy = dy / len;
  const count = Math.max(1, Math.floor(len / 60));
  const chevrons = [];
  for (let i = 1; i <= count; i++) {
    let t = i / (count + 1);
    if (reversed) t = 1 - t;
    const cx = A.x + dx * t, cy = A.y + dy * t;
    const size = 5;
    const dirx = reversed ? -ux : ux, diry = reversed ? -uy : uy;
    const px = -diry, py = dirx; // perpendicular
    const tipx = cx + dirx * size, tipy = cy + diry * size;
    const b1x = cx - dirx * size + px * size, b1y = cy - diry * size + py * size;
    const b2x = cx - dirx * size - px * size, b2y = cy - diry * size - py * size;
    chevrons.push(
      <polyline key={i}
        points={`${b1x},${b1y} ${tipx},${tipy} ${b2x},${b2y}`}
        className="flow-chevron"
        style={{ stroke: tripped ? '#3a4552' : color, strokeWidth: 1.6, opacity: tripped ? 0.4 : 0.9 }}
      />
    );
  }
  return <g>{chevrons}</g>;
}

// ---------------------------------------------------------------------
// Main App
// ---------------------------------------------------------------------
function App() {
  const [data, setData] = useState(null);
  const [loadError, setLoadError] = useState(null);
  const [mode, setMode] = useState('view'); // view | simulate | edit
  const [selected, setSelected] = useState(null); // {type:'sub'|'line', id}
  const [hoverLine, setHoverLine] = useState(null);
  const [hoverPos, setHoverPos] = useState({ x: 0, y: 0 });
  const [search, setSearch] = useState('');
  const [tripped, setTripped] = useState({}); // local sim overrides {lineId:true}
  const [saving, setSaving] = useState(false);
  const [lastSync, setLastSync] = useState(null);

  const load = useCallback(async () => {
    if (GAS_URL.startsWith('REPLACE')) {
      setLoadError('demo'); // show demo/offline fallback data
      setData(DEMO_DATA);
      return;
    }
    try {
      const res = await apiGet();
      if (res.ok) { setData(res.data); setLoadError(null); setLastSync(new Date()); }
      else setLoadError(res.error || 'Unknown error');
    } catch (err) {
      setLoadError(err.message);
    }
  }, []);

  useEffect(() => { load(); }, [load]);

  const linesWithStatus = useMemo(() => {
    if (!data) return [];
    return data.lines.map(l => tripped[l.id] ? { ...l, status: 'tripped' } : l);
  }, [data, tripped]);

  const subById = useMemo(() => {
    const m = {};
    (data ? data.substations : []).forEach(s => m[s.id] = s);
    return m;
  }, [data]);

  const isolatedNodes = useMemo(() => {
    if (!data || mode !== 'simulate') return [];
    const trippedIds = Object.keys(tripped).filter(k => tripped[k]);
    if (!trippedIds.length) return [];
    let allIsolated = new Set();
    trippedIds.forEach(lid => {
      findIsolatedNodes(data.substations, linesWithStatus, null).forEach(n => allIsolated.add(n));
    });
    return [...allIsolated];
  }, [data, mode, tripped, linesWithStatus]);

  const trippedLineDetails = useMemo(() => {
    if (!data) return [];
    return Object.keys(tripped).filter(k => tripped[k]).map(lid => {
      const line = data.lines.find(l => l.id === lid);
      if (!line) return null;
      const altPath = findAlternatePath(data.substations, linesWithStatus, line.from, line.to, null);
      return { line, altPath };
    }).filter(Boolean);
  }, [data, tripped, linesWithStatus]);

  function toggleTrip(lineId) {
    setTripped(prev => ({ ...prev, [lineId]: !prev[lineId] }));
  }

  async function persistEdit(action, payload) {
    setSaving(true);
    try {
      const res = await apiPost(action, payload);
      if (res.ok) setData(res.data);
      else alert('Save failed: ' + res.error);
    } catch (err) {
      alert('Network error saving to sheet: ' + err.message + '\n(Demo/offline mode — edits only apply locally.)');
    }
    setSaving(false);
  }

  if (!data) {
    return <div className="loading"><div className="spinner"/>Loading grid data…</div>;
  }

  const filteredSubIds = search.trim()
    ? new Set(data.substations.filter(s => s.name.toLowerCase().includes(search.toLowerCase())).map(s => s.id))
    : null;

  return (
    <div className="app">
      <TopBar mode={mode} setMode={setMode} search={search} setSearch={setSearch} saving={saving} />
      <div className="body">
        <div className="canvas-wrap">
          <NetworkSVG
            data={data}
            lines={linesWithStatus}
            subById={subById}
            mode={mode}
            selected={selected}
            setSelected={setSelected}
            setHoverLine={setHoverLine}
            setHoverPos={setHoverPos}
            toggleTrip={toggleTrip}
            isolatedNodes={isolatedNodes}
            filteredSubIds={filteredSubIds}
          />
          {hoverLine && (
            <div className="tooltip" style={{ left: hoverPos.x + 16, top: hoverPos.y + 16 }}>
              <div className="tt-title">{hoverLine.name}</div>
              <div className="tt-row">Voltage: {hoverLine.voltage} kV</div>
              <div className="tt-row">Normal flow: {formatFlow(hoverLine, subById)}</div>
              <div className="tt-row">Status: {hoverLine.status === 'tripped' ? 'TRIPPED' : 'In service'}</div>
            </div>
          )}
        </div>
        <SidePanel
          data={data}
          lines={linesWithStatus}
          subById={subById}
          selected={selected}
          setSelected={setSelected}
          mode={mode}
          toggleTrip={toggleTrip}
          tripped={tripped}
          isolatedNodes={isolatedNodes}
          trippedLineDetails={trippedLineDetails}
          persistEdit={persistEdit}
        />
      </div>
      <StatusStrip loadError={loadError} lastSync={lastSync} data={data} />
    </div>
  );
}

function formatFlow(line, subById) {
  const from = subById[line.from] ? subById[line.from].name : line.from;
  const to = subById[line.to] ? subById[line.to].name : line.to;
  return line.flowDir === 'to->from' ? `${to} → ${from}` : `${from} → ${to}`;
}

function TopBar({ mode, setMode, search, setSearch, saving }) {
  return (
    <div className="topbar">
      <div className="brand">
        <span className="t1">MSETC GRID VIEWER</span>
        <span className="t2">765 / 400 kV NETWORK — CONTINGENCY REFERENCE</span>
      </div>
      <div className="modes">
        {['view', 'simulate', 'edit'].map(m => (
          <button key={m} className={'mode-btn' + (mode === m ? ' active' : '')} onClick={() => setMode(m)}>
            {m.toUpperCase()}
          </button>
        ))}
      </div>
      <div className="legend">
        <span className="legend-item"><span className="dot" style={{ background: 'var(--v765)' }}/>765 kV</span>
        <span className="legend-item"><span className="dot" style={{ background: 'var(--v400)' }}/>400 kV</span>
        <span className="legend-item"><span className="dot" style={{ background: 'var(--v220)' }}/>220 kV</span>
        {saving && <span className="legend-item mono">saving…</span>}
      </div>
      <input className="search mono" placeholder="Search substation…" value={search}
        onChange={e => setSearch(e.target.value)} />
    </div>
  );
}

function NetworkSVG({ data, lines, subById, mode, selected, setSelected, setHoverLine, setHoverPos, toggleTrip, isolatedNodes, filteredSubIds }) {
  const wrapRef = useRef(null);
  const isolatedSet = useMemo(() => new Set(isolatedNodes), [isolatedNodes]);

  function onLineEnter(e, line) {
    setHoverLine(line);
    const rect = wrapRef.current.getBoundingClientRect();
    setHoverPos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
  }
  function onLineMove(e) {
    const rect = wrapRef.current.getBoundingClientRect();
    setHoverPos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
  }
  function onLineLeave() { setHoverLine(null); }

  function onLineClick(line) {
    if (mode === 'simulate') {
      toggleTrip(line.id);
    } else {
      setSelected({ type: 'line', id: line.id });
    }
  }

  const width = 1260, height = 820;

  return (
    <div ref={wrapRef} style={{ position: 'relative', width: '100%', height: '100%' }}>
      <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
        {lines.map(line => {
          const a = subById[line.from], b = subById[line.to];
          if (!a || !b) return null;
          const vclass = 'v' + line.voltage;
          const isSelected = selected && selected.type === 'line' && selected.id === line.id;
          return (
            <g key={line.id}>
              <path className={`line-path ${vclass} ${line.status === 'tripped' ? 'tripped' : ''}`}
                d={pathD(a, b)} strokeWidth={isSelected ? 3.5 : 2.2}
                opacity={line.status === 'tripped' ? 0.55 : 1} />
              <FlowChevrons a={a} b={b} reversed={line.flowDir === 'to->from'}
                color={`var(--${vclass})`} tripped={line.status === 'tripped'} />
              <path className="line-hit" d={pathD(a, b)}
                onMouseEnter={(e) => onLineEnter(e, line)}
                onMouseMove={onLineMove}
                onMouseLeave={onLineLeave}
                onClick={() => onLineClick(line)} />
            </g>
          );
        })}

        {data.icts.map(ict => {
          const s = subById[ict.substationId];
          if (!s) return null;
          const p = scalePt(s);
          return (
            <g key={ict.id} transform={`translate(${p.x + 22}, ${p.y - 22})`}>
              <rect className="ict-badge" x="-13" y="-8" width="26" height="16" rx="3" />
              <text className="ict-label" x="0" y="4" textAnchor="middle">{ict.hvSide}/{ict.lvSide}</text>
            </g>
          );
        })}

        {data.substations.map(s => {
          const p = scalePt(s);
          const dimmed = filteredSubIds && !filteredSubIds.has(s.id);
          const isIsolated = isolatedSet.has(s.id);
          const isSelected = selected && selected.type === 'sub' && selected.id === s.id;
          return (
            <g key={s.id} className="sub-node" transform={`translate(${p.x},${p.y})`}
              opacity={dimmed ? 0.25 : 1}
              onClick={() => setSelected({ type: 'sub', id: s.id })}>
              <circle className="sub-circle" r={isSelected ? 10 : 7}
                stroke={isIsolated ? 'var(--danger)' : `var(--v${s.voltage})`}
                style={isIsolated ? { animation: 'none' } : {}} />
              {isIsolated && <circle r="14" fill="none" stroke="var(--danger)" strokeWidth="1.5" strokeDasharray="3 2" />}
              <text className="sub-label" x="12" y="4">{s.name}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function SidePanel({ data, lines, subById, selected, setSelected, mode, toggleTrip, tripped, isolatedNodes, trippedLineDetails, persistEdit }) {
  if (mode === 'simulate') {
    return (
      <div className="sidepanel">
        <h2>Simulation</h2>
        <div className="sub">Click any line in the diagram to trip / restore it.</div>
        {trippedLineDetails.length === 0 && (
          <div className="panel-empty">No lines tripped.<br/>Click a line to begin contingency analysis.</div>
        )}
        {trippedLineDetails.map(({ line, altPath }) => (
          <div key={line.id} className="sim-banner">
            <div className="head">⚡ {line.name} — TRIPPED</div>
            <div className="conn-row" style={{ marginTop: 6 }}>
              <span>Alternate path available?</span>
              <span className={altPath ? 'pill ok' : 'pill tripped'}>{altPath ? 'YES' : 'NO PATH'}</span>
            </div>
            {altPath && (
              <div style={{ marginTop: 6, color: 'var(--muted)', fontSize: 11 }}>
                {altPath.map(id => (subById[id] ? subById[id].name : id)).join('  →  ')}
              </div>
            )}
            <button className="btn" onClick={() => toggleTrip(line.id)}>Restore Line</button>
          </div>
        ))}
        {isolatedNodes.length > 0 && (
          <div className="sim-banner">
            <div className="head">⚠ Substations Isolated (radial feed lost)</div>
            <ul>
              {isolatedNodes.map(id => <li key={id}>{subById[id] ? subById[id].name : id}</li>)}
            </ul>
          </div>
        )}
      </div>
    );
  }

  if (!selected) {
    return (
      <div className="sidepanel">
        <h2>Details</h2>
        <div className="sub">Click a substation or line to view details.</div>
        <div className="panel-empty">Nothing selected.</div>
      </div>
    );
  }

  if (selected.type === 'sub') {
    const s = subById[selected.id];
    if (!s) return null;
    const connLines = lines.filter(l => l.from === s.id || l.to === s.id);
    const connIcts = data.icts.filter(i => i.substationId === s.id);
    return (
      <div className="sidepanel">
        <h2>{s.name}</h2>
        <div className="sub">{s.region} · {s.voltage} kV bus</div>

        <div className="section-title">Connected Lines ({connLines.length})</div>
        {connLines.map(l => {
          const other = l.from === s.id ? l.to : l.from;
          const otherSub = subById[other];
          const outgoing = (l.flowDir === 'from->to') === (l.from === s.id);
          return (
            <div key={l.id} className="conn-row">
              <div>
                <div className="name">{otherSub ? otherSub.name : other}</div>
                <div className="dir">{outgoing ? '→ export' : '← import'} · {l.status === 'tripped' ? 'TRIPPED' : 'normal'}</div>
              </div>
              <span className={`pill v${l.voltage}`}>{l.voltage}kV</span>
            </div>
          );
        })}

        <div className="section-title">ICTs ({connIcts.length})</div>
        {connIcts.length === 0 && <div className="conn-row" style={{ color: 'var(--muted)' }}>No ICTs at this station</div>}
        {connIcts.map(i => (
          <div key={i.id} className="conn-row">
            <div className="name">{i.name}</div>
            <span className="pill v765">{i.hvSide}/{i.lvSide} kV</span>
          </div>
        ))}

        {mode === 'edit' && <EditSubForm sub={s} persistEdit={persistEdit} />}
      </div>
    );
  }

  if (selected.type === 'line') {
    const l = lines.find(x => x.id === selected.id);
    if (!l) return null;
    const a = subById[l.from], b = subById[l.to];
    return (
      <div className="sidepanel">
        <h2>{l.name}</h2>
        <div className="sub">{l.voltage} kV · {l.status === 'tripped' ? 'TRIPPED' : 'In service'}</div>
        <div className="section-title">Endpoints</div>
        <div className="conn-row"><div className="name">{a ? a.name : l.from}</div><span className="dir">FROM</span></div>
        <div className="conn-row"><div className="name">{b ? b.name : l.to}</div><span className="dir">TO</span></div>
        <div className="section-title">Normal Flow Direction</div>
        <div className="conn-row"><div className="name mono">{formatFlow(l, subById)}</div></div>
        {mode === 'edit' && <EditLineForm line={l} persistEdit={persistEdit} />}
      </div>
    );
  }

  return null;
}

function EditSubForm({ sub, persistEdit }) {
  const [name, setName] = useState(sub.name);
  const [notes, setNotes] = useState(sub.notes || '');
  return (
    <div>
      <div className="section-title">Edit Substation</div>
      <div className="field"><label>Name</label><input value={name} onChange={e => setName(e.target.value)} /></div>
      <div className="field"><label>Notes</label><input value={notes} onChange={e => setNotes(e.target.value)} /></div>
      <button className="btn primary" onClick={() => persistEdit('updateSubstation', { id: sub.id, name, notes })}>Save Changes</button>
      <button className="btn danger" onClick={() => { if (confirm('Delete this substation?')) persistEdit('deleteSubstation', { id: sub.id }); }}>Delete Substation</button>
    </div>
  );
}

function EditLineForm({ line, persistEdit }) {
  const [name, setName] = useState(line.name);
  const [flowDir, setFlowDir] = useState(line.flowDir);
  const [status, setStatus] = useState(line.status);
  return (
    <div>
      <div className="section-title">Edit Line</div>
      <div className="field"><label>Name</label><input value={name} onChange={e => setName(e.target.value)} /></div>
      <div className="field">
        <label>Normal Flow Direction</label>
        <select value={flowDir} onChange={e => setFlowDir(e.target.value)}>
          <option value="from->to">From → To</option>
          <option value="to->from">To → From</option>
        </select>
      </div>
      <div className="field">
        <label>Status</label>
        <select value={status} onChange={e => setStatus(e.target.value)}>
          <option value="in-service">In service</option>
          <option value="tripped">Tripped</option>
        </select>
      </div>
      <button className="btn primary" onClick={() => persistEdit('updateLine', { id: line.id, name, flowDir, status })}>Save Changes</button>
      <button className="btn danger" onClick={() => { if (confirm('Delete this line?')) persistEdit('deleteLine', { id: line.id }); }}>Delete Line</button>
    </div>
  );
}

function StatusStrip({ loadError, lastSync, data }) {
  return (
    <div className="status-strip">
      <span>Substations: <span className="ok">{data.substations.length}</span></span>
      <span>Lines: <span className="ok">{data.lines.length}</span></span>
      <span>ICTs: <span className="ok">{data.icts.length}</span></span>
      {loadError === 'demo' && <span className="err">DEMO DATA — set GAS_URL in index.html to connect your Google Sheet</span>}
      {loadError && loadError !== 'demo' && <span className="err">Sync error: {loadError}</span>}
      {lastSync && <span>Last sync: {lastSync.toLocaleTimeString()}</span>}
    </div>
  );
}
